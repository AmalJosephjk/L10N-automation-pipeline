import re
import json
import os

SOURCE_FILE = "src/app.js"
BASE_FILE = "locales/en.json"

TARGET_LANGS = ["fr", "de"]  # 👈 add more later

pattern = r'"(.*?)"'

def extract_strings():
    with open(SOURCE_FILE, "r", encoding="utf-8") as f:
        content = f.read()

    matches = re.findall(pattern, content)

    data = {}
    for i, text in enumerate(matches):
        data[f"key_{i+1}"] = text

    os.makedirs("locales", exist_ok=True)

    # ✅ Write source file
    with open(BASE_FILE, "w", encoding="utf-8") as f:
        json.dump(data, f, indent=2, ensure_ascii=False)

    print("✅ en.json updated")

    # ✅ Create/update target languages
    for lang in TARGET_LANGS:
        target_file = f"locales/{lang}.json"

        if os.path.exists(target_file):
            with open(target_file, "r", encoding="utf-8") as f:
                existing = json.load(f)
        else:
            existing = {}

        # Add missing keys only (important!)
        for key, value in data.items():
            if key not in existing:
                existing[key] = ""  # empty translation

        with open(target_file, "w", encoding="utf-8") as f:
            json.dump(existing, f, indent=2, ensure_ascii=False)

        print(f"✅ {lang}.json updated")

extract_strings()
