name: Localization Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  localization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Extraction Script
        run: python scripts/extract_strings.py

      - name: Validate JSON
        run: python -m json.tool locales/en.json > /dev/null

      - name: Install Lokalise CLI v2
        uses: lokalise/install-lokalise-cli-v2@v2.1.0
        with:
          force-install: true         # Optional: force reinstallation even if already installed
          target-version: 3.1.3       # Optional: specify CLI version (e.g., 3.1.1). Defaults to latest.
          add-to-path: false          # Optional: don't add lokalise2 command to PATH (it's installed under the `./bin` directory)

      - name: Download translations
       # Or use ./bin/lokalise2 if you choose not to add lokalise2 to PATH
      run: |
        lokalise2 file download --token API_TOKEN --project-id abcd1234.5678 --format json

      - name: Upload to Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          lokalise2 file upload \
            --token "$LOKALISE_API_TOKEN" \
            --project-id "$LOKALISE_PROJECT_ID" \
            --file "locales/en.json" \
            --lang-iso en \
            --replace-modified

      - name: Download from Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          lokalise2 file download \
            --token "$LOKALISE_API_TOKEN" \
            --project-id "$LOKALISE_PROJECT_ID" \
            --format json \
            --unzip-to "./locales"

      - name: Commit Translations
        run: |
          git config --global user.name "localization-bot"
          git config --global user.email "bot@email.com"
          git add locales/
          git commit -m "Update translations" || echo "No changes"
          git push

      - name: Upload to Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          lokalise2 file upload \
            --token "$LOKALISE_API_TOKEN" \
            --project-id "$LOKALISE_PROJECT_ID" \
            --file "locales/en.json" \
            --lang-iso en \
            --replace-modified

      - name: Download from Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          lokalise2 file download \
            --token "$LOKALISE_API_TOKEN" \
            --project-id "$LOKALISE_PROJECT_ID" \
            --format json \
            --unzip-to "./locales"

      - name: Commit Translations
        run: |
          git config --global user.name "localization-bot"
          git config --global user.email "bot@email.com"
          git add locales/
          git commit -m "Update translations" || echo "No changes"
          git push
