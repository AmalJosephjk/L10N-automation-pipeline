name: Localization Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  localization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Extraction Script
        run: python scripts/extract_strings.py

      - name: Validate JSON
        run: python -m json.tool locales/en.json > /dev/null

      - name: Install Lokalise CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/lokalise/lokalise-cli-2-go/master/install.sh | sh
      - name: Verify Lokalise CLI
        run: lokalise2 --version

      - name: Upload to Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: lokalise2 file upload --token "$LOKALISE_API_TOKEN" --project-id "$LOKALISE_PROJECT_ID" --file "locales/en.json" --lang-iso en --replace-modified

      - name: Download from Lokalise
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: lokalise2 file download --token "$LOKALISE_API_TOKEN" --project-id "$LOKALISE_PROJECT_ID" --format json --unzip-to "./locales"

      - name: Commit Translations
        run: |
          git config --global user.name "localization-bot"
          git config --global user.email "bot@email.com"
          git add locales/
          git commit -m "Update translations" || echo "No changes"
          git push
