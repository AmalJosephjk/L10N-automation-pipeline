name: Localization Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  localization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Extraction Script
        run: python scripts/extract_strings.py

      - name: Validate JSON
        run: python -m json.tool locales/en.json > /dev/null

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Lokalise CLI
        run: npm install -g @lokalise/lokalise2-cli

      - name: Upload to Lokalise
        run: |
          lokalise2 file upload \
            --token ${{ secrets.LOKALISE_API_TOKEN }} \
            --project-id ${{ secrets.LOKALISE_PROJECT_ID }} \
            --file locales/en.json \
            --lang-iso en \
            --replace-modified

      - name: Download from Lokalise
        run: |
          lokalise2 file download \
            --token ${{ secrets.LOKALISE_API_TOKEN }} \
            --project-id ${{ secrets.LOKALISE_PROJECT_ID }} \
            --format json \
            --unzip-to ./locales

      - name: Commit Translations
        run: |
          git config --global user.name "localization-bot"
          git config --global user.email "bot@email.com"
          git add locales/
          git commit -m "Update translations from Lokalise" || echo "No changes"
          git push
